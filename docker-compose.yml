services:
  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    environment:
      - LLAMA_ARG_N_GPU_Layers=${N_GPU_LAYERS:-0}
    command: >
      --model /models/${MODEL_FILE:-llama-2-7b.Q4_K_M.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size ${CTX_SIZE:-4096}
      --n-gpu-layers ${N_GPU_LAYERS:-0}
    restart: unless-stopped

  omni-bridge:
    build: .
    depends_on:
      - llama-server
    environment:
      - LLM_MODE=local
      - LLM_PROVIDER=local_llamacpp
      - LLM_ENDPOINT_URL=http://llama-server:8080
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./state:/data/state
      - ./workspace:/data/workspace
    command: >
      --state /data/state
      --workspace /data/workspace
      --config /app/config
      --event ${EVENT_TYPE:-git_automation}
      --payload ${TASK_PAYLOAD:-"Routine check and code refactor"}
