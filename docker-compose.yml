services:
  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    profiles: ["llamacpp"]
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      --model /models/${MODEL_FILE:-llama-2-7b.Q4_K_M.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size ${CTX_SIZE:-4096}
      --n-gpu-layers ${N_GPU_LAYERS:-0}
    restart: unless-stopped

  localai:
    image: localai/localai:latest
    profiles: ["localai"]
    ports:
      - "8081:8080"
    environment:
      - MODELS_PATH=/models
    volumes:
      - ./models:/models
      - ./localai-models:/build/models

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-models:/root/.ollama
    entrypoint: ["ollama", "serve"]

  omni-bridge:
    build: .
    profiles: ["llamacpp", "localai", "ollama"]
    depends_on:
      - llama-server
      - localai
      - ollama
    environment:
      - LLM_MODE=local
      - LLM_ENDPOINT_URL=${LLM_ENDPOINT_URL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./state:/data/state
      - ./workspace:/data/workspace
    command: >
      --state /data/state
      --workspace /data/workspace
      --config /app/config
      --event ${EVENT_TYPE:-git_automation}
      --payload ${TASK_PAYLOAD:-"Routine check and code refactor"}

  nanobot:
    build:
      context: .
      dockerfile: Dockerfile.nanobot
    profiles: ["nanobot"]
    ports:
      - "4097:4097"
    volumes:
      - ../agent-state:/state:ro
      - ../project-source:/workspace:rw
    restart: unless-stopped
