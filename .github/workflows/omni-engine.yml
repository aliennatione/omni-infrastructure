name: Omni-Agent Distributed Engine

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Tipo di evento (routing key)'
        required: true
        default: 'git_automation'
      payload:
        description: 'Testo del task da eseguire'
        required: true
        default: 'Routine check and code refactor'
      mode:
        description: 'Modalità: cloud (Gemini) o local (LLM locale via tunnel)'
        required: true
        default: 'cloud'
        type: choice
        options:
          - cloud
          - local

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Infrastructure
      uses: actions/checkout@v4
      with:
        path: infrastructure

    - name: Checkout Agent State
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/agent-state'
        token: ${{ secrets.STATE_REPO_PAT }}
        path: state

    - name: Checkout Project Source
      uses: actions/checkout@v4
      with:
        repository: '${{ github.repository_owner }}/project-source'
        token: ${{ secrets.SOURCE_REPO_PAT }}
        fetch-depth: 0
        path: workspace

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install -r infrastructure/requirements.txt

    - name: Run Omni Bridge
      env:
        PYTHONPATH: ${{ github.workspace }}/infrastructure/core
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        LLM_MODE: ${{ github.event.inputs.mode || 'cloud' }}
        LLM_ENDPOINT_URL: ${{ secrets.LLM_ENDPOINT_URL || '' }}
        LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || '' }}
      run: |
        MODE_FLAG="${{ github.event.inputs.mode || 'cloud' }}"

        CMD="python3 infrastructure/core/bridge.py \
          --state ./state \
          --workspace ./workspace \
          --config ./infrastructure/config \
          --event \"${{ github.event.inputs.event_type || 'git_automation' }}\" \
          --payload \"${{ github.event.inputs.payload || 'Routine context update.' }}\" \
          --mode $MODE_FLAG"

        echo "[*] Esecuzione bridge in modalità: $MODE_FLAG"
        eval $CMD

    - name: Workspace PR Creation
      env:
        GH_TOKEN: ${{ secrets.SOURCE_REPO_PAT }}
      run: |
        cd workspace
        git config user.email "omni-agent@autonomous.local"
        git config user.name "Omni Agent"

        if [ -n "$(git status --porcelain)" ]; then
          BRANCH="agent/run-${GITHUB_RUN_ID}"
          git checkout -b $BRANCH
          git add .
          git commit -m "AI autonomous modifications"
          git push origin $BRANCH

          gh pr create \
            --title "Omni-Agent update run ${GITHUB_RUN_ID}" \
            --body "Automated modifications generated by Omni Infrastructure." \
            --base main \
            --head $BRANCH
        else
          echo "Nessuna modifica nel workspace."
        fi

    - name: Sync Agent Memory
      if: always()
      run: |
        cd state
        git config user.email "omni-brain@autonomous.local"
        git config user.name "Omni Brain"

        if [ -n "$(git status --porcelain)" ]; then
          git add .
          git commit -m "Context evolution update [Run: ${GITHUB_RUN_ID}]"
          git remote set-url origin https://x-access-token:${{ secrets.STATE_REPO_PAT }}@github.com/${{ github.repository_owner }}/agent-state.git
          git push origin main
        else
          echo "Nessuna modifica alla memoria."
        fi
